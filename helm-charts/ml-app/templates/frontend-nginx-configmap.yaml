apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ml-app.fullname" . }}-frontend-nginx-config
  labels:
    {{- include "ml-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ .Values.frontend.name }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Proxy API Gateway requests
        location /api/ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.apiGateway.name }}:{{ .Values.apiGateway.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Generic proxy for hardcoded IP:port patterns (e.g., /172.16.3.104:500X/*)
        # This handles requests from frontend with hardcoded external URLs
        location ~ ^/\d+\.\d+\.\d+\.\d+:(\d+)/(.*)$ {
            set $backend_port $1;
            set $backend_path $2;
            
            # Route based on port number to internal Kubernetes services
            if ($backend_port = 5000) {
                set $backend_service "http://{{ include "ml-app.fullname" . }}-{{ .Values.apiGateway.name }}:{{ .Values.apiGateway.port }}";
            }
            if ($backend_port = 5001) {
                set $backend_service "http://{{ include "ml-app.fullname" . }}-{{ .Values.mlPrediction.name }}:{{ .Values.mlPrediction.port }}";
            }
            if ($backend_port = 5002) {
                set $backend_service "http://{{ include "ml-app.fullname" . }}-{{ .Values.modelTraining.name }}:{{ .Values.modelTraining.port }}";
            }
            if ($backend_port = 5003) {
                set $backend_service "http://{{ include "ml-app.fullname" . }}-{{ .Values.dataService.name }}:{{ .Values.dataService.port }}";
            }
            
            proxy_pass $backend_service/$backend_path;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy health check endpoints for each service
        location /api-gateway-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.apiGateway.name }}:{{ .Values.apiGateway.port }}/health;
            proxy_set_header Host $host;
        }

        location /ml-prediction-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.mlPrediction.name }}:{{ .Values.mlPrediction.port }}/health;
            proxy_set_header Host $host;
        }

        location /model-training-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.modelTraining.name }}:{{ .Values.modelTraining.port }}/health;
            proxy_set_header Host $host;
        }

        location /data-service-health {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.dataService.name }}:{{ .Values.dataService.port }}/health;
            proxy_set_header Host $host;
        }

        # Proxy model training add-training-data endpoint
        location /training/ {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.modelTraining.name }}:{{ .Values.modelTraining.port }}/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy ML prediction endpoint
        location /predict {
            proxy_pass http://{{ include "ml-app.fullname" . }}-{{ .Values.mlPrediction.name }}:{{ .Values.mlPrediction.port }}/predict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Favicon - return empty to avoid 404
        location = /favicon.ico {
            return 204;
            access_log off;
            log_not_found off;
        }
    }
