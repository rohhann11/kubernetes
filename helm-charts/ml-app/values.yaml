# Default values for ml-app
# This is a YAML-formatted file.

replicaCount: 1

# Global image configuration - each service can override
image:
  pullPolicy: IfNotPresent
  tag: latest

# Image pull secrets for private registries
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

# API Gateway Configuration
apiGateway:
  name: api-gateway
  port: 5000
  serviceType: LoadBalancer
  image:
    repository: rohhann/kubernetes-ml-app-api-gateway
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ML Prediction Service Configuration
mlPrediction:
  name: ml-prediction
  port: 5001
  image:
    repository: rohhann/kubernetes-ml-app-ml-prediction
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Model Training Service Configuration
modelTraining:
  name: model-training
  port: 5002
  image:
    repository: rohhann/kubernetes-ml-app-model-training-service
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Data Service Configuration
dataService:
  name: data-service
  port: 5003
  image:
    repository: rohhann/kubernetes-ml-app-data-service
    tag: latest
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Frontend Configuration
frontend:
  name: frontend
  port: 80
  containerPort: 80
  serviceType: LoadBalancer
  image:
    repository: rohhann/kubernetes-ml-app-frontend
    tag: latest
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

nodeSelector: {}

tolerations: []

affinity: {}
